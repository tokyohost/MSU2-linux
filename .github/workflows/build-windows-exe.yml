name: 构建 Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 构建 Windows ${{ matrix.bits }} 位 EXE
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86
            bits: 32
            asset_name: msu2-linux-windows-x86.exe
          - architecture: x64
            bits: 64
            asset_name: msu2-linux-windows-x64.exe

    steps:
      - name: 检出项目代码
        uses: actions/checkout@v6

      - name: 安装对应架构 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: ${{ matrix.architecture }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: 安装 32 位兼容版 NumPy
        if: matrix.architecture == 'x86'
        run: python -m pip install "numpy<2"

      - name: 安装运行及打包依赖
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: 构建并验证 EXE
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm msu2_windows.spec
          Move-Item -LiteralPath "dist/msu2-linux.exe" -Destination "dist/${{ matrix.asset_name }}"
          & "dist/${{ matrix.asset_name }}" --list-templates

      - name: 上传 EXE 构建产物
        uses: actions/upload-artifact@v7
        with:
          name: windows-exe-${{ matrix.bits }}bit
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: 发布 Windows EXE
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: 下载 32 位和 64 位程序
        uses: actions/download-artifact@v5
        with:
          pattern: windows-exe-*
          path: release-assets
          merge-multiple: true

      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
          fi
          gh release upload "${GITHUB_REF_NAME}" release-assets/*.exe --clobber
